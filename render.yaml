# Render.com — two services from one GitHub repo
# Import via Dashboard → New → Blueprint, or create each service manually.

services:
  # FastAPI backend (API)
  - type: web
    name: game0701-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: cram_journey
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ENV
        value: staging
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEV_AUTH_ENABLED
        value: "true"
      - key: STRICT_DATA_CONSENT
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

  # React static frontend
  - type: web
    name: game0701-web
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: build
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CI
        value: "false"
      - key: DISABLE_ESLINT_PLUGIN
        value: "true"
      - key: GENERATE_SOURCEMAP
        value: "false"
      - key: REACT_APP_BACKEND_URL
        sync: false
